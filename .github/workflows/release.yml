name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  GO_VERSION: "1.24"
  WAILS_VERSION: "v2.12.0"
  NODE_VERSION: "20"
  APP_NAME: "XenRelayProxy"

jobs:
  # ─── macOS (arm64 + amd64) ──────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build macOS app
        run: wails build -platform darwin/arm64

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 425 178 \
            --icon "${{ env.APP_NAME }}.app" 175 178 \
            "build/bin/${{ env.APP_NAME }}-macos-arm64.dmg" \
            "build/bin/${{ env.APP_NAME }}.app" || true

      - name: Fallback to zip if DMG fails
        if: always()
        run: |
          if [ ! -f "build/bin/${{ env.APP_NAME }}-macos-arm64.dmg" ]; then
            cd build/bin
            zip -r "${{ env.APP_NAME }}-macos-arm64.zip" "${{ env.APP_NAME }}.app"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            build/bin/*.dmg
            build/bin/*.zip

  # ─── Windows (amd64 + arm64) ────────────────────────────────
  build-windows:
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows app with installer
        run: wails build -platform windows/${{ matrix.arch }} -nsis

      - name: Rename artifacts with arch suffix
        shell: bash
        run: |
          cd build/bin
          for f in *-installer.exe; do
            [ -f "$f" ] && mv "$f" "${f%-installer.exe}-${{ matrix.arch }}-installer.exe"
          done
          [ -f "${{ env.APP_NAME }}.exe" ] && mv "${{ env.APP_NAME }}.exe" "${{ env.APP_NAME }}-${{ matrix.arch }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            build/bin/*-installer.exe
            build/bin/${{ env.APP_NAME }}-${{ matrix.arch }}.exe

  # ─── Linux GUI (amd64) ─────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            nsis

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build Linux app
        run: wails build -platform linux/amd64

      - name: Create .deb package
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          VERSION="${VERSION#v}"  # strip leading v
          PKG_DIR="build/deb/xenrelayproxy_${VERSION}_amd64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/lib/systemd/system"
          mkdir -p "$PKG_DIR/etc/xenrelayproxy"

          cp build/bin/${{ env.APP_NAME }} "$PKG_DIR/usr/bin/xenrelayproxy"
          chmod 755 "$PKG_DIR/usr/bin/xenrelayproxy"
          cp config.example.json "$PKG_DIR/etc/xenrelayproxy/config.json"

          cat > "$PKG_DIR/DEBIAN/control" <<EOF
          Package: xenrelayproxy
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.0-37, ca-certificates
          Maintainer: XenRelayProxy <noreply@xenrelayproxy.local>
          Description: HTTP/SOCKS5 relay proxy through Google Apps Script
           Desktop proxy app with GUI that relays HTTP traffic through
           Google Apps Script. Supports MITM, SOCKS5, chunked downloads,
           and multi-account scheduling.
          EOF

          cat > "$PKG_DIR/usr/share/applications/xenrelayproxy.desktop" <<EOF
          [Desktop Entry]
          Name=XenRelayProxy
          Comment=HTTP/SOCKS5 Relay Proxy
          Exec=/usr/bin/xenrelayproxy
          Type=Application
          Categories=Network;Utility;
          EOF

          cat > "$PKG_DIR/lib/systemd/system/xenrelayproxy.service" <<EOF
          [Unit]
          Description=XenRelayProxy - HTTP/SOCKS5 Relay Proxy
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/xenrelayproxy -config /etc/xenrelayproxy/config.json
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65535

          [Install]
          WantedBy=multi-user.target
          EOF

          dpkg-deb --root-owner-group --build "$PKG_DIR" \
            "build/bin/xenrelayproxy_${VERSION}_amd64.deb"

      - name: Create tarball
        run: |
          cd build/bin
          tar czf ${{ env.APP_NAME }}-linux-amd64.tar.gz ${{ env.APP_NAME }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            build/bin/*.deb
            build/bin/*.tar.gz

  # ─── CLI-only builds (no GUI, static binary) ───────────────
  build-cli:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -o "build/bin/xenrelayproxy-cli-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/xenrelayproxy-cli/

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/xenrelayproxy-cli-*

  # ─── Create GitHub Release ─────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-linux, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "*.dmg" -o -name "*.zip" -o -name "*.exe" \
            -o -name "*.deb" -o -name "*.tar.gz" \
            -o -name "xenrelayproxy-cli-*" \
          \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "${{ env.APP_NAME }} ${{ github.ref_name || inputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
